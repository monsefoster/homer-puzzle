name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      APP_ENV: test
      PANTHER_ERROR_SCREENSHOT_DIR: var/error-screenshots
      PANTHER_NO_SANDBOX: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v2
        with:
          install-chromedriver: true

      - name: Expose Chrome binaries to Panther
        run: |
          echo "PANTHER_CHROME_BINARY=${{ steps.chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"
          echo "$(dirname "${{ steps.chrome.outputs.chromedriver-path }}")" >> "$GITHUB_PATH"

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Show browser versions
        run: |
          "$PANTHER_CHROME_BINARY" --version
          chromedriver --version

      - name: Lint Twig templates
        run: php bin/console lint:twig templates

      - name: Lint Symfony container
        run: php bin/console lint:container

      - name: Run PHPUnit suite
        run: php bin/phpunit

      - name: Upload Panther screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: panther-error-screenshots
          path: var/error-screenshots
          if-no-files-found: ignore
